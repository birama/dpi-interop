# PINS — Docker Compose Production (DB externe, sécurisé, HTTPS actif)
# PostgreSQL géré par docker-compose.pg.yml (réseau pins-net partagé)
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pins-api
    restart: unless-stopped
    env_file:
      - backend/.env
    networks:
      - pins-net
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        VITE_API_URL: ${VITE_API_URL:-}
    container_name: pins-frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /opt/dpi-interop/certs:/etc/nginx/certs:ro
    networks:
      - pins-net
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    depends_on:
      backend:
        condition: service_healthy

networks:
  pins-net:
    driver: bridge
    internal: false
