name: Deploy DPI-Interop

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          source: "."
          target: "/opt/dpi-interop"
          rm: false
          overwrite: true

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          envs: DATABASE_URL,JWT_SECRET
          script: |
            cd /opt/dpi-interop
            cat > backend/.env << ENVEOF
            NODE_ENV=production
            HOST=0.0.0.0
            PORT=3000
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_EXPIRES_IN=24h
            CORS_ORIGIN=https://dpi-interop.sec.gouv.sn
            RATE_LIMIT_MAX=200
            RATE_LIMIT_TIMEWINDOW=60000
            LOG_LEVEL=info
            ENVEOF
            docker compose -f docker-compose.prod.yml down || true
            docker compose -f docker-compose.prod.yml up -d --build
            sleep 20
            docker compose -f docker-compose.prod.yml exec -T backend npx prisma migrate deploy || true
            sleep 5
            curl -sf http://localhost:3000/health && echo "Deployment OK" || echo "Backend not ready"
