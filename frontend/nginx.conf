# PINS — Nginx HTTPS (terminaison TLS sur notre serveur)
# Le WAF (10.42.70.19) transmet en HTTP ou HTTPS

server {
    listen 80;
    server_name dpi-interop.sec.gouv.sn;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name dpi-interop.sec.gouv.sn;

    ssl_certificate     /etc/nginx/certs/fullchain-sec-gouv-sn.pem;
    ssl_certificate_key /etc/nginx/certs/wildcard-sec-2025.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    add_header Strict-Transport-Security "max-age=15552000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; script-src 'self'; font-src 'self' https: data:; frame-ancestors 'self'; object-src 'none'; base-uri 'self'; form-action 'self'" always;

    set_real_ip_from 10.42.70.19;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    resolver 127.0.0.11 valid=10s;
    set $backend_upstream pins-api;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api {
        proxy_pass http://$backend_upstream:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }
}
