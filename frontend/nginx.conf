# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name dpi-interop.senum.sn;
    return 301 https://$host$request_uri;
}

# HTTPS
server {
    listen 443 ssl;
    server_name dpi-interop.senum.sn;

    ssl_certificate /etc/letsencrypt/live/dpi-interop.senum.sn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dpi-interop.senum.sn/privkey.pem;

    resolver 127.0.0.11 valid=10s;
    set $backend_upstream pins-api;

    root /usr/share/nginx/html;
    index index.html;

    # Taille max pour uploads (pieces jointes feedbacks Vue 360°)
    client_max_body_size 10M;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api {
        proxy_pass http://$backend_upstream:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # Webhook GitHub → listener local (port 9000) pour auto-deploy
    # Le listener valide la signature HMAC avant de declencher le deploy.
    # Le container frontend doit etre lance avec :
    #   --add-host=host.docker.internal:host-gateway
    location /webhook/ {
        proxy_pass http://host.docker.internal:9000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # GitHub peut envoyer des payloads de plusieurs MB sur gros repos
        client_max_body_size 25M;
        # Pas de timeout trop long : le listener repond en < 1s (deploy en async)
        proxy_read_timeout 10s;
        proxy_connect_timeout 5s;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }
}
